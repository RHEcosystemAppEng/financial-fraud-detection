{{- if .Values.ngcSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: ngc-secret
  labels:
    {{- include "fraud-init-pipeline.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"nvcr.io":{"username":"$oauthtoken","password":"%s"}}}` .Values.ngcSecret.registryKey | b64enc | quote }}
{{- end }}
