apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fraud-data
  labels:
    {{- include "fraud-preprocess.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.size }}
  {{- if .Values.storage.className }}
  storageClassName: {{ .Values.storage.className }}
  {{- end }}
