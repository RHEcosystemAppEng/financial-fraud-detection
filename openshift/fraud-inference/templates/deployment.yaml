apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-triton
  labels:
    app.kubernetes.io/component: triton
    {{- include "fraud-inference.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-triton
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: fraud-triton
        app.kubernetes.io/component: triton
        {{- include "fraud-inference.labels" . | nindent 8 }}
    spec:
      affinity:
        nodeAffinity:
          {{- toYaml .Values.nodeAffinity | nindent 10 }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      tolerations:
        {{- toYaml .Values.gpu.tolerations | nindent 8 }}
      containers:
        - name: triton
          image: {{ if .Values.image.fullImage }}{{ .Values.image.fullImage | quote }}{{ else }}{{ printf "%s/%s/%s:%s" .Values.image.registry (include "fraud-inference.imageNamespace" .) .Values.image.repository .Values.image.tag | quote }}{{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - tritonserver
            - --model-repository=/models
            - --model-control-mode=poll
            - --repository-poll-secs=30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 8001
            - name: metrics
              containerPort: 8002
          env:
            - name: TOKENIZERS_PARALLELISM
              value: {{ .Values.env.TOKENIZERS_PARALLELISM | quote }}
            - name: LD_LIBRARY_PATH
              value: {{ .Values.env.LD_LIBRARY_PATH | quote }}
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 5
          volumeMounts:
            - name: models
              mountPath: /models
              subPath: python_backend_model_repository
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: fraud-models
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
