apiVersion: batch/v1
kind: Job
metadata:
  name: fraud-training
  labels:
    {{- include "fraud-training.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/component: training
        {{- include "fraud-training.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          {{- toYaml .Values.nodeAffinity | nindent 10 }}
      imagePullSecrets:
        - name: ngc-secret
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      tolerations:
        {{- toYaml .Values.gpu.tolerations | nindent 8 }}
      containers:
        - name: training
          image: {{ if .Values.image.fullImage }}{{ .Values.image.fullImage | quote }}{{ else }}{{ printf "%s/%s:%s" .Values.image.registry .Values.image.repository .Values.image.tag | quote }}{{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: TabFormer/gnn
            - name: models
              mountPath: /trained_models
            - name: training-config
              mountPath: /app/config.json
              subPath: config.json
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: fraud-data
        - name: models
          persistentVolumeClaim:
            claimName: fraud-models
        - name: training-config
          configMap:
            name: fraud-training-config
